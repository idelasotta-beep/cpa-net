# Postgres local para desarrollo (Fase 1).
# En producción se usa el Postgres gestionado de Railway.
services:
  db:
    image: postgres:16-alpine
    container_name: cpa-net-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cpa
      POSTGRES_PASSWORD: cpa
      POSTGRES_DB: cpa_net
    ports:
      - "5432:5432"
    volumes:
      - cpa_net_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpa -d cpa_net"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cpa_net_pgdata:
